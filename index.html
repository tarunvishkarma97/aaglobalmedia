<!DOCTYPE html>
<html>
<head>
<title>AA GLOBAL Media</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#000;
color:white;
margin:0;
}

header{
background:#00bcd4;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
color:black;
}

.news{
background:#1e1e1e;
margin:20px;
padding:15px;
border-radius:10px;
}

.news h3{
color:#00bcd4;
}

.news img{
width:100%;
border-radius:10px;
}

a{
color:#00bcd4;
text-decoration:none;
}
</style>

</head>

<body>

<header>AA GLOBAL Media</header>

<div id="news"></div>

<script>

fetch("https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=en-IN&gl=IN&ceid=IN:en")
.then(res=>res.json())
.then(data=>{

let newsHTML="";

data.items.slice(0,10).forEach(article=>{

newsHTML += `
<div class="news">
<img src="${article.thumbnail}">
<h3>${article.title}</h3>
<p>${article.pubDate}</p>
<a href="${article.link}" target="_blank">Read Full News</a>
</div>
`;

});

document.getElementById("news").innerHTML=newsHTML;

});

</script>

</body>
</html>
