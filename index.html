<!DOCTYPE html>
<html>
<head>
<title>AA GLOBAL Media</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family: Arial;
background:#111;
color:white;
margin:0;
}

header{
background:#00c3ff;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:black;
}

.news{
background:#1e1e1e;
margin:20px;
padding:15px;
border-radius:10px;
}

.news h3{
color:#00c3ff;
}

a{
color:#00c3ff;
text-decoration:none;
}
</style>

</head>

<body>

<header>AA GLOBAL Media</header>

<div id="news"></div>

<script>

let url = "https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=en-IN&gl=IN&ceid=IN:en";

fetch(url)
.then(res => res.json())
.then(data => {

let html = "";

data.items.slice(0,10).forEach(news => {

html += `
<div class="news">
<h3>${news.title}</h3>
<p>${news.pubDate}</p>
<a href="${news.link}" target="_blank">Read Full News</a>
</div>
`;

});

document.getElementById("news").innerHTML = html;

});

</script>

</body>
</html>
