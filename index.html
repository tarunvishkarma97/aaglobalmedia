<!DOCTYPE html>
<html>
<head>
<title>AA GLOBAL Media</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family: Arial;
background:#111;
color:white;
margin:0;
}

header{
background:#00c3ff;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:black;
}

.news-container{
padding:20px;
}

.news{
background:#1e1e1e;
margin-bottom:20px;
padding:15px;
border-radius:10px;
}

.news img{
width:100%;
border-radius:10px;
}

.news h3{
color:#00c3ff;
}

.news a{
color:#00c3ff;
text-decoration:none;
}
</style>

</head>

<body>

<header>AA GLOBAL Media</header>

<div class="news-container" id="news"></div>

<script>

let url = "https://gnews.io/api/v4/top-headlines?lang=en&country=in&max=10&apikey=9f5f9a5f8c4b4b1a9c8e1b2f3a4b5c6d";

fetch(url)
.then(response => response.json())
.then(data => {

let newsHTML = "";

data.articles.forEach(article => {

newsHTML += `
<div class="news">
<img src="${article.image}">
<h3>${article.title}</h3>
<p>${article.description}</p>
<a href="${article.url}" target="_blank">Read Full News</a>
</div>
`;

});

document.getElementById("news").innerHTML = newsHTML;

});

</script>

</body>
</html>
