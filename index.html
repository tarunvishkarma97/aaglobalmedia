<!DOCTYPE html>
<html>
<head>
<title>AA GLOBAL Media</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#121212;
color:white;
margin:0;
}

header{
background:#00bcd4;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
color:black;
}

.container{
padding:10px;
}

.card{
display:flex;
background:#1e1e1e;
margin:12px 0;
border-radius:10px;
overflow:hidden;
}

.card img{
width:120px;
height:100px;
object-fit:cover;
}

.card-content{
padding:10px;
flex:1;
}

.card-content h3{
font-size:16px;
margin:0;
}

.source{
font-size:12px;
color:#00bcd4;
margin-top:6px;
}

</style>

</head>

<body>

<header>AA GLOBAL Media</header>

<div class="container" id="news"></div>

<script>

fetch("https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss")
.then(res=>res.json())
.then(data=>{

let html="";

data.items.slice(0,10).forEach(article=>{

html+=`

<div class="card">

<img src="${article.thumbnail}">

<div class="card-content">

<h3>${article.title}</h3>

<div class="source">
${article.author} • ${article.pubDate}
</div>

</div>

</div>

`;

});

document.getElementById("news").innerHTML=html;

});

</script>

</body>
</html>
