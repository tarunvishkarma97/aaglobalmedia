<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AA GLOBAL Media</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

header{
background:#00bcd4;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:black;
}

.news{
background:#1e1e1e;
margin:15px;
padding:15px;
border-radius:10px;
}

.news h3{
color:#00bcd4;
font-size:18px;
}

.news a{
color:#00bcd4;
text-decoration:none;
}

</style>
</head>

<body>

<header>AA GLOBAL Media</header>

<div id="news"></div>

<script>

fetch("https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss")
.then(response => response.json())
.then(data => {

let html="";

data.items.slice(0,10).forEach(article => {

html += `
<div class="news">
<h3>${article.title}</h3>
<p>${article.pubDate}</p>
<a href="${article.link}" target="_blank">Read Full News</a>
</div>
`;

});

document.getElementById("news").innerHTML = html;

});

</script>

</body>
</html>
